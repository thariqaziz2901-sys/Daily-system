<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily System">
<meta name="theme-color" content="#0F6E56">
<title>Daily System</title>
<style>
  :root {
    --green: #0F6E56;
    --green-light: #E1F5EE;
    --green-mid: #1D9E75;
    --green-dark: #085041;
    --text: #1a1a18;
    --text-sec: #6b6b67;
    --text-ter: #9b9b96;
    --bg: #f5f4f0;
    --bg2: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.06);
    --blue: #185FA5;
    --amber: #854F0B;
    --purple: #534AB7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --text: #e8e6e0;
      --text-sec: #a0a09a;
      --text-ter: #6b6b67;
      --bg: #1a1a18;
      --bg2: #242422;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.06);
      --green-light: #0a3d2e;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }

  /* NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 0.5px solid var(--border); display: flex; z-index: 100; }
  .nav-btn { flex: 1; padding: 10px 0 14px; display: flex; flex-direction: column; align-items: center; gap: 4px; border: none; background: transparent; color: var(--text-ter); font-size: 10px; cursor: pointer; transition: color .2s; }
  .nav-btn.active { color: var(--green-mid); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* PANELS */
  .panel { display: none; padding: 16px; }
  .panel.active { display: block; }

  /* HEADER */
  .page-header { margin-bottom: 18px; }
  .page-header h1 { font-size: 22px; font-weight: 600; }
  .page-header p { font-size: 13px; color: var(--text-sec); margin-top: 3px; }

  /* MORNING BANNER */
  .morning-banner { background: var(--green); border-radius: 16px; padding: 18px 20px; margin-bottom: 16px; }
  .morning-banner .label { font-size: 10px; font-weight: 600; color: #9FE1CB; letter-spacing: .08em; margin-bottom: 8px; }
  .morning-banner .greeting { font-size: 20px; font-weight: 600; color: #E1F5EE; line-height: 1.3; }
  .morning-banner .sub { font-size: 12px; color: #5DCAA5; margin-top: 6px; }

  /* PROGRESS BAR */
  .prog-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 18px; overflow: hidden; }
  .prog-fill { height: 3px; background: var(--green-mid); border-radius: 2px; transition: width .4s; }

  /* INSIGHT CARDS */
  .insight-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; padding: 16px 18px 16px 14px; margin-bottom: 10px; display: flex; gap: 12px; align-items: flex-start; cursor: pointer; transition: background .15s; position: relative; }
  .insight-card.read { border-left: 3px solid var(--green-mid); border-radius: 0 14px 14px 0; background: var(--green-light); }
  .insight-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0; margin-top: 4px; transition: all .2s; }
  .insight-card.read .insight-dot { background: var(--green-mid); border-color: var(--green-mid); }
  .insight-text { font-size: 14px; line-height: 1.75; color: var(--text); flex: 1; }
  .insight-card.read .insight-text { color: var(--green-dark); }
  @media (prefers-color-scheme: dark) { .insight-card.read .insight-text { color: #9FE1CB; } }

  /* ADD INSIGHT */
  .add-section { margin-top: 20px; }
  .section-label { font-size: 10px; font-weight: 600; color: var(--text-ter); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 10px; }
  textarea { width: 100%; border: 0.5px solid var(--border); border-radius: 12px; padding: 12px 14px; font-size: 14px; font-family: inherit; background: var(--bg2); color: var(--text); resize: none; outline: none; line-height: 1.6; min-height: 90px; }
  .btn { display: inline-block; padding: 9px 20px; border-radius: 22px; border: 0.5px solid var(--border); background: transparent; color: var(--text-sec); font-size: 13px; cursor: pointer; margin-top: 8px; }
  .btn:active { opacity: .7; }
  .btn.primary { background: var(--green); color: #fff; border-color: transparent; }

  /* TRACKER */
  .day-nav-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .day-nav-bar button { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 10px; padding: 8px 16px; font-size: 14px; color: var(--text-sec); cursor: pointer; }
  .day-title { font-size: 16px; font-weight: 600; }

  /* WEEK STRIP */
  .week-strip { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
  .week-strip::-webkit-scrollbar { display: none; }
  .wd-item { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 40px; cursor: pointer; }
  .wd-circle { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--text-ter); transition: all .2s; }
  .wd-circle.today { border-color: var(--green-mid); color: var(--green-mid); }
  .wd-circle.selected { outline: 2.5px solid var(--green-mid); outline-offset: 2px; }
  .wd-circle.has-data { background: var(--green-mid); border-color: var(--green-mid); color: #fff; }
  .wd-label { font-size: 10px; color: var(--text-ter); }

  /* STATS */
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--bg2); border-radius: 12px; padding: 14px 16px; border: 0.5px solid var(--border2); }
  .stat-val { font-size: 28px; font-weight: 600; }
  .stat-lbl { font-size: 11px; color: var(--text-sec); margin-top: 3px; }

  /* TIME BLOCKS */
  .time-block { margin-bottom: 10px; border-radius: 12px; overflow: hidden; border: 0.5px solid var(--border2); }
  .tb-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg2); border-bottom: 0.5px solid var(--border2); }
  .tb-time { font-size: 11px; font-weight: 600; min-width: 56px; }
  .tb-label { font-size: 13px; font-weight: 500; }
  .task-row { display: flex; align-items: center; gap: 12px; padding: 11px 14px; background: var(--bg2); border-bottom: 0.5px solid var(--border2); cursor: pointer; transition: background .1s; }
  .task-row:last-child { border-bottom: none; }
  .task-row:active { background: var(--bg); }
  .task-row.done .task-text { color: var(--text-ter); text-decoration: line-through; }
  .checkbox { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .task-row.done .checkbox { background: var(--green-mid); border-color: var(--green-mid); }
  .task-text { font-size: 13px; line-height: 1.4; flex: 1; }
  .task-dur { font-size: 11px; color: var(--text-ter); flex-shrink: 0; }
</style>
</head>
<body>

<!-- PANEL: IDENTITY -->
<div class="panel active" id="panel-identity">
  <div class="morning-banner">
    <div class="label">BACA INI DULU — SEBELUM APAPUN</div>
    <div class="greeting" id="greeting">Selamat pagi.</div>
    <div class="sub" id="morning-sub">Tap setiap kartu setelah dibaca.</div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="section-label">Insight & prinsip</div>
  <div id="insight-list"></div>
  <div class="add-section">
    <div class="section-label">Tambah insight baru</div>
    <textarea id="new-insight" placeholder="Tulis insight, kutipan, atau prinsip baru yang kamu temukan..."></textarea>
    <button class="btn primary" onclick="addInsight()">+ Simpan</button>
  </div>
</div>

<!-- PANEL: TRACKER -->
<div class="panel" id="panel-tracker">
  <div class="day-nav-bar">
    <button onclick="changeDay(-1)">&#8592;</button>
    <div class="day-title" id="day-title"></div>
    <button onclick="changeDay(1)">&#8594;</button>
  </div>
  <div class="week-strip" id="week-strip"></div>
  <div class="stat-row">
    <div class="stat-card"><div class="stat-val" id="stat-done">0</div><div class="stat-lbl">Task selesai</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-pct">0%</div><div class="stat-lbl">Completion</div></div>
  </div>
  <div id="schedule"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-identity" onclick="switchPanel('identity')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z"/><path d="M3 21c0-4 4-7 9-7s9 3 9 7"/></svg>
    Identitas
  </button>
  <button class="nav-btn" id="nav-tracker" onclick="switchPanel('tracker')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
    Goals
  </button>
</nav>

<script>
const SCHEDULE = [
  {time:'03.00–04.00', label:'Bangun & tahajud', color:'#0F6E56', tasks:[
    {id:'t01', text:'Tahajud — minimal 4 rakaat', dur:'45m'},
    {id:'t02', text:'Ngaji — 1 halaman minimum', dur:'10m'},
    {id:'t03', text:'Buka app ini, baca identitas', dur:'5m'},
  ]},
  {time:'04.00–05.30', label:'Subuh & zikir pagi', color:'#085041', tasks:[
    {id:'t04', text:'Sholat subuh tepat waktu', dur:'15m'},
    {id:'t05', text:'Zikir pagi — 100x istighfar', dur:'15m'},
    {id:'t06', text:'Baca artikel / materi engineering', dur:'30m'},
  ]},
  {time:'05.30–07.00', label:'Deep learning — engineering', color:'#185FA5', tasks:[
    {id:'t07', text:'Pelajari satu konsep proses engineering', dur:'45m'},
    {id:'t08', text:'Catat satu hal baru yang dipelajari', dur:'15m'},
  ]},
  {time:'07.00–08.00', label:'Pagi & siap', color:'#5F5E5A', tasks:[
    {id:'t09', text:'Makan & bersiap — tidak scroll', dur:'30m'},
    {id:'t10', text:'Review task kerja hari ini', dur:'15m'},
  ]},
  {time:'08.00–12.00', label:'Kerja — deliverable', color:'#185FA5', tasks:[
    {id:'t11', text:'Fokus satu deliverable utama', dur:'2j'},
    {id:'t12', text:'Catat progress simulasi / kalkulasi', dur:'30m'},
  ]},
  {time:'12.00–13.00', label:'Dzuhur & istirahat', color:'#5F5E5A', tasks:[
    {id:'t13', text:'Sholat dzuhur tepat waktu', dur:'15m'},
    {id:'t14', text:'Makan & istirahat — tidak scroll', dur:'30m'},
  ]},
  {time:'13.00–17.00', label:'Kerja sesi 2', color:'#185FA5', tasks:[
    {id:'t15', text:'Lanjut deliverable / riset', dur:'2j'},
    {id:'t16', text:'Sholat ashar — tidak ditunda', dur:'15m'},
  ]},
  {time:'17.00–19.00', label:'Gym', color:'#854F0B', tasks:[
    {id:'t17', text:'Upper / Lower split — minimal 40 menit', dur:'60m'},
    {id:'t18', text:'Protein post-workout', dur:''},
  ]},
  {time:'19.00–21.00', label:'Konten Islamic history', color:'#534AB7', tasks:[
    {id:'t19', text:'Riset atau tulis script satu scene', dur:'45m'},
    {id:'t20', text:'Proses visual / edit jika script siap', dur:'45m'},
    {id:'t21', text:'Sholat isya tepat waktu', dur:'15m'},
  ]},
  {time:'21.00–22.30', label:'Wind down', color:'#5F5E5A', tasks:[
    {id:'t22', text:'Review hari — apa yang berhasil?', dur:'10m'},
    {id:'t23', text:'Niat tahajud besok — set alarm 03.00', dur:'5m'},
    {id:'t24', text:'Tidur — HP di luar jangkauan', dur:''},
  ]},
];

const DEFAULT_INSIGHTS = [
  "Break your big dreams into projects and tasks. A project needs multiple steps — a task can be done right now without breaking it down further.",
  "Make yourself SO busy, SO disciplined, SO determined that you don't have time to know what's happening in other people's lives. Stay focused and devoted to yourself.",
  "Setiap kali scrolling, otak memproses ribuan informasi sampah yang tidak relevan. Pilih dengan sadar apa yang masuk ke kepalamu.",
  "Al-Qur'an bukan sekadar teks religi — dia alat neuro-terapi. Baca bukan untuk kurangi waktumu, tapi untuk memberi kualitas pada waktu yang kamu miliki.",
  "Qur'an bukan beban tambahan — dia energi yang kamu aktifkan sebelum bergerak.",
  "Otak yang sibuk membangun tidak punya ruang untuk dihancurkan. Sibukkan dirimu dengan yang benar.",
  "Kamu tidak sedang melawan diri sendiri — kamu sedang melatih otak untuk mengenal siapa kamu sebenarnya.",
];

const DAYS = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
const MONTHS = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];

let dayOffset = 0;

function load(k, d) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch(e) { return d; } }
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

function getDateKey(off) {
  const d = new Date(); d.setDate(d.getDate() + off);
  return d.toISOString().slice(0,10);
}

function switchPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'identity') renderIdentity();
  if (name === 'tracker') renderTracker();
}

// ── IDENTITY ──
function renderIdentity() {
  const insights = load('insights_v2', DEFAULT_INSIGHTS);
  const todayKey = 'read_' + new Date().toISOString().slice(0,10);
  const readArr = load(todayKey, []);

  const hr = new Date().getHours();
  const greet = hr < 5 ? 'Bangun untuk yang terbaik.' : hr < 12 ? 'Selamat pagi.' : hr < 17 ? 'Selamat siang.' : 'Selamat malam.';
  document.getElementById('greeting').textContent = greet;
  document.getElementById('morning-sub').textContent = `${readArr.length} dari ${insights.length} insight dibaca hari ini.`;
  const pct = insights.length ? Math.round(readArr.length / insights.length * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';

  const list = document.getElementById('insight-list');
  list.innerHTML = '';
  insights.forEach((txt, i) => {
    const isRead = readArr.includes(i);
    const card = document.createElement('div');
    card.className = 'insight-card' + (isRead ? ' read' : '');
    card.innerHTML = `<div class="insight-dot"></div><div class="insight-text">${txt}</div>`;
    card.onclick = () => {
      const arr = load(todayKey, []);
      const idx = arr.indexOf(i);
      if (idx === -1) arr.push(i); else arr.splice(idx, 1);
      save(todayKey, arr);
      renderIdentity();
    };
    list.appendChild(card);
  });
}

function addInsight() {
  const ta = document.getElementById('new-insight');
  const txt = ta.value.trim();
  if (!txt) return;
  const arr = load('insights_v2', DEFAULT_INSIGHTS);
  arr.push(txt);
  save('insights_v2', arr);
  ta.value = '';
  renderIdentity();
}

// ── TRACKER ──
function renderTracker() {
  const dk = getDateKey(dayOffset);
  const d = new Date(); d.setDate(d.getDate() + dayOffset);
  const dayName = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'][d.getDay()];
  document.getElementById('day-title').textContent = `${dayName}, ${d.getDate()} ${MONTHS[d.getMonth()]}`;

  const done = load('tasks_' + dk, {});
  const total = SCHEDULE.reduce((a, b) => a + b.tasks.length, 0);
  const doneCount = Object.values(done).filter(Boolean).length;
  document.getElementById('stat-done').textContent = doneCount;
  document.getElementById('stat-pct').textContent = Math.round(doneCount / total * 100) + '%';

  // Week strip
  const strip = document.getElementById('week-strip');
  strip.innerHTML = '';
  for (let i = -3; i <= 3; i++) {
    const dd = new Date(); dd.setDate(dd.getDate() + i);
    const wdk = dd.toISOString().slice(0,10);
    const wdone = load('tasks_' + wdk, {});
    const wdoneCount = Object.values(wdone).filter(Boolean).length;
    const pct = Math.round(wdoneCount / total * 100);
    const isToday = i === 0, isCur = i === dayOffset;
    const item = document.createElement('div'); item.className = 'wd-item';
    const circle = document.createElement('div');
    circle.className = 'wd-circle' + (wdoneCount > 0 ? ' has-data' : isToday ? ' today' : '') + (isCur ? ' selected' : '');
    circle.textContent = wdoneCount > 0 ? pct + '%' : DAYS[dd.getDay()];
    circle.onclick = (function(off){ return function(){ dayOffset = off; renderTracker(); }; })(i);
    const lbl = document.createElement('div'); lbl.className = 'wd-label';
    lbl.textContent = isToday ? 'hari ini' : dd.getDate() + '';
    item.appendChild(circle); item.appendChild(lbl);
    strip.appendChild(item);
  }

  // Schedule
  const sched = document.getElementById('schedule');
  sched.innerHTML = '';
  SCHEDULE.forEach(block => {
    const wrap = document.createElement('div'); wrap.className = 'time-block';
    const header = document.createElement('div'); header.className = 'tb-header';
    header.innerHTML = `<span class="tb-time" style="color:${block.color}">${block.time}</span><span class="tb-label">${block.label}</span>`;
    wrap.appendChild(header);
    block.tasks.forEach(task => {
      const isDone = !!done[task.id];
      const row = document.createElement('div');
      row.className = 'task-row' + (isDone ? ' done' : '');
      row.innerHTML = `<div class="checkbox">${isDone ? '<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}</div><div class="task-text">${task.text}</div>${task.dur ? `<div class="task-dur">${task.dur}</div>` : ''}`;
      row.onclick = () => {
        const d2 = load('tasks_' + dk, {});
        d2[task.id] = !d2[task.id];
        save('tasks_' + dk, d2);
        renderTracker();
      };
      wrap.appendChild(row);
    });
    sched.appendChild(wrap);
  });
}

renderIdentity();
</script>
</body>
</html>
